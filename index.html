<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Job Quest | Mobile Final</title>
    <style>
    :root { --emerald: #10b981; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --blue: #3b82f6; --red: #ef4444; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; overflow-x: hidden; }
    .container { max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    
    header { border-bottom: 2px solid var(--card); padding-bottom: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
    h1 { color: var(--emerald); margin: 0; font-size: 1.8rem; font-weight: 900; }

    /* Modal / Overlay Styling */
    .modal-overlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(15, 23, 42, 0.95); display: none; 
        justify-content: center; align-items: center; z-index: 1000; 
    }
    .form-box { 
        background: var(--card); padding: 1.5rem; border-radius: 16px; 
        width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #475569;
    }
    
    input, select { background: var(--bg); border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; width: 100%; box-sizing: border-box; }
    
    .form-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
    #addBtn { background: var(--emerald); color: var(--bg); border: none; font-weight: bold; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    #delBtn { background: #334155; color: #94a3b8; border: none; font-weight: bold; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
    #delBtn.confirm-state { background: var(--red); color: white; }
    .btn-cancel { background: transparent; color: #94a3b8; border: none; padding: 10px; cursor: pointer; font-size: 0.9rem; text-decoration: underline; }

    /* Responsive Table Fix */
    .table-box { background: white; border-radius: 12px; color: #1e293b; width: 100%; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    
    /* Desktop Row */
    tr { display: table-row; }
    td { padding: 12px; border-bottom: 1px solid #f1f5f9; word-wrap: break-word; }

    /* Mobile Row Overrides */
    @media (max-width: 600px) {
        tr { 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        td { 
            display: block; 
            padding: 5px !important; 
            border: none; 
            width: auto !important; 
        }
        td:first-child { flex: 1 1 100%; margin-bottom: 8px; } /* Company/Title takes full top row */
        td:nth-child(2) { flex: 0 0 auto; margin-right: 10px; } /* Status dropdown */
        td:last-child { flex: 1 0 auto; text-align: right !important; } /* Action buttons */
    }

    .company-name { font-weight: bold; font-size: 1rem; display: block; color: #0f172a; }
    .job-title { font-size: 0.75rem; color: #64748b; }

    .status-select { border-radius: 6px; padding: 6px; font-weight: bold; font-size: 0.75rem; border: none; width: 110px; cursor: pointer; }
    .status-applied { background: #fef9c3; color: #854d0e; }
    .status-interviewing { background: #dcfce7; color: #166534; }
    .status-offer { background: #10b981; color: white; }
    .status-rejected { background: #fee2e2; color: #991b1b; }

    .btn-link { background: var(--blue); color: white; text-decoration: none; padding: 10px 14px; border-radius: 8px; font-weight: bold; display: inline-block; font-size: 0.8rem; }
    .btn-edit { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.75rem; margin-left: 5px; }

    .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--emerald); color: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; border: none; z-index: 100; }
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>JOB QUEST</h1>
        <div id="sync-status" style="display:none; color: var(--emerald); font-weight: bold; font-size: 0.8rem;">SYNCING...</div>
    </header>

    <div class="table-box">
        <table>
            <tbody id="tableBody">
                <tr><td style="text-align:center; padding:2rem;">Connecting to Node...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay">
    <form id="jobForm" class="form-box">
        <h2 id="modalTitle" style="margin-top:0; color:var(--emerald)">Add Application</h2>
        <input type="text" id="company" placeholder="Company Name" required>
        <input type="text" id="title" placeholder="Job Title" required>
        <input type="url" id="jobUrl" placeholder="App Link (https://...)">
        <select id="status">
            <option value="Applied">Applied</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
        </select>
        
        <div class="form-actions">
            <button type="submit" id="addBtn">SAVE ENTRY</button>
            <button type="button" id="delBtn" onclick="handleDeleteClick()">DELETE ENTRY</button>
            <button type="button" class="btn-cancel" onclick="closeModal()">Dismiss</button>
        </div>
    </form>
</div>

<button class="fab" onclick="openModalForAdd()">+</button>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyApDqMKCN17ubbkpHLqolVMlmN3gmnSFyTGCQP1uJcUK0vG_FGBwDMcS3ceEVpNs4O/exec';
    let jobData = [];
    let deleteConfirmMode = false;

    function loadJobs() {
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=renderTable&t=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.renderTable = function(data) {
        jobData = data;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach((item, index) => {
            const tr = document.createElement('tr');
            const sClass = `status-${(item.status || 'applied').toLowerCase()}`;
            tr.innerHTML = `
                <td>
                    <span class="company-name">${item.company}</span>
                    <span class="job-title">${item.title}</span>
                </td>
                <td style="width:110px">
                    <select class="status-select ${sClass}" onchange="quickUpdate('${item.company}', this.value)">
                        <option value="Applied" ${item.status==='Applied'?'selected':''}>Applied</option>
                        <option value="Interviewing" ${item.status==='Interviewing'?'selected':''}>Interviewing</option>
                        <option value="Offer" ${item.status==='Offer'?'selected':''}>Offer</option>
                        <option value="Rejected" ${item.status==='Rejected'?'selected':''}>Rejected</option>
                    </select>
                </td>
                <td style="text-align:right; white-space:nowrap;">
                    ${item.url ? `<a href="${item.url}" target="_blank" rel="noopener" class="btn-link">🔗</a>` : ''}
                    <button class="btn-edit" onclick="setEdit(${index})">EDIT</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    };

    function openModalForAdd() {
        resetDeleteButton();
        document.getElementById('jobForm').reset();
        document.getElementById('modalTitle').innerText = "Add Application";
        document.getElementById('addBtn').innerText = "SAVE ENTRY";
        document.getElementById('delBtn').style.display = "none";
        document.getElementById('company').readOnly = false;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    window.setEdit = function(index) {
        resetDeleteButton();
        const item = jobData[index];
        document.getElementById('company').value = item.company;
        document.getElementById('title').value = item.title;
        document.getElementById('status').value = item.status;
        document.getElementById('jobUrl').value = item.url || "";
        
        document.getElementById('modalTitle').innerText = "Update Entry";
        document.getElementById('addBtn').innerText = "UPDATE ENTRY";
        document.getElementById('delBtn').style.display = "block";
        document.getElementById('company').readOnly = true;
        document.getElementById('modalOverlay').style.display = 'flex';
    };

    // Custom Delete Logic for Mobile (Bypasses Browser Pop-ups)
    async function handleDeleteClick() {
        const btn = document.getElementById('delBtn');
        const company = document.getElementById('company').value;

        if (!deleteConfirmMode) {
            // First tap: Enter confirmation state
            deleteConfirmMode = true;
            btn.innerText = "TAP AGAIN TO CONFIRM DELETE";
            btn.classList.add('confirm-state');
            
            // Revert back if they don't tap again in 3 seconds
            setTimeout(resetDeleteButton, 3000);
        } else {
            // Second tap: Execute
            showStatus(true);
            closeModal();
            await fetch(API_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ company, action: 'delete' }) 
            });
            location.reload();
        }
    }

    function resetDeleteButton() {
        deleteConfirmMode = false;
        const btn = document.getElementById('delBtn');
        if(btn) {
            btn.innerText = "DELETE ENTRY";
            btn.classList.remove('confirm-state');
        }
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        resetDeleteButton();
    }

    async function quickUpdate(company, status) {
        showStatus(true);
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ company, status }) });
        loadJobs();
        showStatus(false);
    }

    function showStatus(visible) {
        document.getElementById('sync-status').style.display = visible ? 'block' : 'none';
    }

    document.getElementById('jobForm').onsubmit = async (e) => {
        e.preventDefault();
        showStatus(true);
        closeModal();
        const payload = {
            company: document.getElementById('company').value,
            title: document.getElementById('title').value,
            status: document.getElementById('status').value,
            url: document.getElementById('jobUrl').value
        };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        location.reload();
    };

    window.onload = loadJobs;
</script>
</body>
</html>
