<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Quest Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-4xl font-extrabold text-emerald-400 tracking-tight">Job Quest <span class="text-slate-500 text-2xl font-light">v1.0</span></h1>
            <p class="text-slate-400 mt-2">Tracking applications for Front-End & Analyst roles.</p>
        </header>
        
        <form id="jobForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-10 bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
            <input type="text" id="company" placeholder="Company" class="bg-slate-700 p-2 rounded border border-slate-600 outline-none focus:border-emerald-400" required>
            <input type="text" id="title" placeholder="Job Title" class="bg-slate-700 p-2 rounded border border-slate-600 outline-none focus:border-emerald-400" required>
            <input type="text" id="location" placeholder="Location (e.g. Knoxville/Remote)" class="bg-slate-700 p-2 rounded border border-slate-600 outline-none focus:border-emerald-400">
            <select id="status" class="bg-slate-700 p-2 rounded border border-slate-600 text-slate-200">
                <option>Applied</option>
                <option>Interviewing</option>
                <option>Offer</option>
                <option>Rejected</option>
                <option>Ghosted</option>
            </select>
            <input type="text" id="resume" placeholder="Resume Version" class="bg-slate-700 p-2 rounded border border-slate-600 outline-none focus:border-emerald-400">
            <button type="submit" id="submitBtn" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold py-2 px-4 rounded-lg transition-all transform active:scale-95">Add Quest</button>
        </form>

        <div class="bg-white rounded-xl shadow-2xl p-4">
            <div id="wrapper"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gridjs/dist/grid.umd.js"></script>
    <script>
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        const WEB_APP_URL = 'YOUR_DEPLOYED_URL_HERE';

        // 1. Initialize Grid.js Table
        const grid = new gridjs.Grid({
            columns: [
                "Date Applied", 
                "Company", 
                "Job Title", 
                "Location", 
                "Status", 
                "Resume Used"
            ],
            server: {
                url: WEB_APP_URL,
                then: data => data.map(item => [
                    item['Date Applied'] ? new Date(item['Date Applied']).toLocaleDateString() : 'N/A', 
                    item.Company, 
                    item['Job Title'],
                    item.Location,
                    item.Status, 
                    item['Resume Used']
                ])
            },
            sort: true,
            search: true,
            resizable: true,
            style: {
                table: { 'font-size': '14px' },
                th: { 'background-color': '#f8fafc', 'color': '#1e293b' }
            },
            pagination: { limit: 10 }
        }).render(document.getElementById("wrapper"));

        // 2. Handle Form Submission
        document.getElementById('jobForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Syncing...';
            
            const payload = {
                company: document.getElementById('company').value,
                title: document.getElementById('title').value,
                location: document.getElementById('location').value,
                status: document.getElementById('status').value,
                resume: document.getElementById('resume').value
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                // Clear form and refresh table
                e.target.reset();
                btn.innerText = 'Success!';
                setTimeout(() => {
                    location.reload(); 
                }, 1000);
            } catch (err) {
                alert('Error connecting to Sheet');
                btn.disabled = false;
                btn.innerText = 'Add Quest';
            }
        };
    </script>
</body>
</html>
