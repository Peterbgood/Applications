<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔍</text></svg>">
    <title>Job Quest</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6f8; color: #1a1a1a; font-size: 15px; }
        header { background: white; border-bottom: 1px solid #e0e0e0; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        header h1 { font-size: 1.1rem; font-weight: 700; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        #sync-status { display: none; font-size: 0.75rem; color: #2563eb; font-weight: 600; margin-right: 10px; }
        .btn-new { background: #2563eb; color: white; border: none; padding: 8px 18px; border-radius: 6px; font-size: 0.875rem; font-weight: 600; cursor: pointer; font-family: inherit; }
        .container { max-width: 900px; margin: 0 auto; padding: 24px 20px 80px; }
        
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px; text-align: center; }
        .stat-num { font-size: 1.8rem; font-weight: 700; line-height: 1; }
        .stat-label { font-size: 0.72rem; color: #888; margin-top: 4px; text-transform: uppercase; font-weight: 600; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .count-label { font-size: 0.85rem; color: #666; }
        .btn-filters { background: white; border: 1px solid #d0d0d0; color: #444; padding: 7px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .btn-filters.active { border-color: #2563eb; color: #2563eb; background: #eff6ff; }

        .filter-panel { background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px; margin-bottom: 16px; display: none; flex-direction: column; gap: 12px; }
        .filter-panel.open { display: flex; }
        .filter-fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.72rem; font-weight: 600; color: #888; text-transform: uppercase; }
        input, select { background: white; border: 1px solid #d0d0d0; color: #1a1a1a; padding: 8px 10px; border-radius: 6px; font-size: 0.875rem; width: 100%; font-family: inherit; }

        .job-list { display: flex; flex-direction: column; gap: 8px; }
        .job-card { background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 16px; }
        .job-info { flex: 1; min-width: 0; }
        .job-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
        .company { font-weight: 700; font-size: 1rem; color: #111; }
        .job-title-text { font-size: 0.85rem; color: #555; }
        
        .job-bottom { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .chip { font-size: 0.72rem; padding: 3px 8px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
        .chip-date { background: #f0f0f0; color: #666; }
        .chip-days { background: #f0f0f0; color: #666; }
        .chip-days.stale { background: #fee2e2; color: #b91c1c; }
        .chip-resume { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        .chip-type { background: #f3e8ff; color: #6b21a8; border: 1px solid #e9d5ff; }
        .chip-remote { background: #dbeafe; color: #1d4ed8; }
        .chip-local { background: #d1fae5; color: #065f46; }
        .chip-applied { background: #fef9c3; color: #854d0e; }
        .chip-interviewing { background: #d1fae5; color: #065f46; }
        .chip-rejected { background: #fee2e2; color: #b91c1c; }

        .job-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .btn-link { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; width: 34px; height: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1rem; }
        .btn-edit { background: #f5f5f5; border: 1px solid #d0d0d0; padding: 0 14px; height: 34px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-box { background: white; border-radius: 12px; width: 100%; max-width: 440px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal-header { padding: 18px 22px 14px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .modal-body { padding: 18px 22px; display: flex; flex-direction: column; gap: 12px; }
        .modal-footer { padding: 14px 22px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; }
        .btn-save { background: #2563eb; color: white; border: none; padding: 11px; border-radius: 6px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-delete { background: #fff5f5; color: #b91c1c; border: 1px solid #fecaca; padding: 9px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; display: none; font-family: inherit; }
        .confirm-area { display: none; flex-direction: column; gap: 8px; }
        .confirm-btns { display: flex; gap: 8px; }
        .confirm-btns button { flex: 1; padding: 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; }
        .btn-yes { background: #b91c1c; color: white; }
        .btn-no { background: #f0f0f0; color: #444; }

        @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } .job-card { flex-wrap: wrap; } .job-actions { width: 100%; justify-content: flex-end; padding-top: 10px; } }
    </style>
</head>
<body>

<header>
    <h1>Job Quest</h1>
    <div class="header-right">
        <span id="sync-status">Saving…</span>
        <button class="btn-new" onclick="Dashboard.openModal()">+ Add Job</button>
    </div>
</header>

<div class="container">
    <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-remote">0</div><div class="stat-label">Remote</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-contract">0</div><div class="stat-label">Contract</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-active">0</div><div class="stat-label">Interviews</div></div>
    </div>

    <div class="toolbar">
        <div class="count-label">Showing <strong id="visibleCount">0</strong> applications</div>
        <button class="btn-filters" id="filterToggle" onclick="Dashboard.toggleFilters()">Filters</button>
    </div>

    <div class="filter-panel" id="filterPanel">
        <div class="filter-fields">
            <div class="filter-group"><label>Search</label><input type="text" id="searchTerm" placeholder="Company/Title..." oninput="Dashboard.render()"></div>
            <div class="filter-group">
                <label>Resume Used</label>
                <select id="filterResume" onchange="Dashboard.render()">
                    <option value="all">All Resumes</option>
                    <option value="Frontend Developer">Frontend Developer</option>
                    <option value="Business Analyst">Business Analyst</option>
                    <option value="Marketing Specialist">Marketing Specialist</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Job Type</label>
                <select id="filterType" onchange="Dashboard.render()">
                    <option value="all">All Types</option>
                    <option value="Full-time">Full-time</option>
                    <option value="Contract">Contract</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Status</label>
                <select id="filterStatus" onchange="Dashboard.render()">
                    <option value="all">All Statuses</option>
                    <option value="Applied">Applied</option>
                    <option value="Interviewing">Interviewing</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Date Applied</label>
                <input type="date" id="filterDate" onchange="Dashboard.render()">
            </div>
        </div>
        <div style="text-align: right; padding-top: 10px;"><button class="btn-reset" onclick="Dashboard.clearFilters()" style="background:none; border:none; color:#2563eb; cursor:pointer; font-size:0.8rem; text-decoration:underline;">Reset All Filters</button></div>
    </div>

    <div class="job-list" id="jobList"></div>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header"><h2 id="modalTitle">Add Job</h2><button onclick="Dashboard.closeModal()" style="border:none; background:none; cursor:pointer; font-size:1.2rem;">✕</button></div>
        <form id="jobForm">
            <input type="hidden" id="oldCompany">
            <div class="modal-body">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label style="font-size:0.7rem; font-weight:600;">Date</label><input type="date" id="formDate"></div>
                    <div><label style="font-size:0.7rem; font-weight:600;">Location</label><select id="formLocation"><option value="Local">Local</option><option value="Remote">Remote</option></select></div>
                </div>
                <div><label style="font-size:0.7rem; font-weight:600;">Company</label><input type="text" id="formCompany" required></div>
                <div><label style="font-size:0.7rem; font-weight:600;">Title</label><input type="text" id="formTitle" required></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label style="font-size:0.7rem; font-weight:600;">Resume Used</label><select id="formResume"><option value="Frontend Developer">Frontend Developer</option><option value="Business Analyst">Business Analyst</option><option value="Marketing Specialist">Marketing Specialist</option></select></div>
                    <div><label style="font-size:0.7rem; font-weight:600;">Job Type</label><select id="formType"><option value="Full-time">Full-time</option><option value="Contract">Contract</option></select></div>
                </div>
                <div><label style="font-size:0.7rem; font-weight:600;">Status</label><select id="formStatus"><option value="Applied">Applied</option><option value="Interviewing">Interviewing</option><option value="Rejected">Rejected</option></select></div>
                <div><label style="font-size:0.7rem; font-weight:600;">URL</label><input type="url" id="formUrl"></div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn-save" id="btnSave">Save Application</button>
                <button type="button" id="deleteBtn" class="btn-delete" onclick="Dashboard.showDeleteConfirm()">Delete this entry</button>
                <div class="confirm-area" id="confirmArea">
                    <div class="confirm-btns">
                        <button type="button" class="btn-yes" onclick="Dashboard.executeDelete()">Yes, delete</button>
                        <button type="button" class="btn-no" onclick="Dashboard.hideDeleteConfirm()">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    // UPDATE THIS URL FROM GOOGLE SCRIPT DEPLOYMENT
    const API_URL = 'https://script.google.com/macros/s/AKfycbyApDqMKCN17ubbkpHLqolVMlmN3gmnSFyTGCQP1uJcUK0vG_FGBwDMcS3ceEVpNs4O/exec'; 

    const Dashboard = {
        data: [],
        init() {
            const script = document.createElement('script');
            script.src = `${API_URL}?callback=Dashboard.load&t=${Date.now()}`;
            document.body.appendChild(script);
        },
        load(raw) { this.data = raw; this.updateStats(); this.render(); },
        toggleFilters() { 
            const panel = document.getElementById('filterPanel');
            const open = panel.classList.toggle('open');
            document.getElementById('filterToggle').classList.toggle('active', open);
        },
        clearFilters() {
            document.getElementById('searchTerm').value = '';
            document.getElementById('filterResume').value = 'all';
            document.getElementById('filterType').value = 'all';
            document.getElementById('filterStatus').value = 'all';
            document.getElementById('filterDate').value = '';
            this.render();
        },
        render() {
            const search = document.getElementById('searchTerm').value.toLowerCase();
            const filterResume = document.getElementById('filterResume').value;
            const filterType = document.getElementById('filterType').value;
            const filterStatus = document.getElementById('filterStatus').value;
            const filterDate = document.getElementById('filterDate').value;
            
            const list = document.getElementById('jobList');
            list.innerHTML = '';
            let count = 0;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            this.data.forEach(item => {
                const itemDate = new Date(item.date);
                const itemDateStr = itemDate.toISOString().split('T')[0];

                if (search && !item.company?.toLowerCase().includes(search) && !item.title?.toLowerCase().includes(search)) return;
                if (filterResume !== 'all' && item.resume !== filterResume) return;
                if (filterType !== 'all' && item.jobType !== filterType) return;
                if (filterStatus !== 'all' && item.status !== filterStatus) return;
                if (filterDate && itemDateStr !== filterDate) return;

                count++;
                const dateStr = itemDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const diff = Math.floor((today - itemDate) / 86400000);
                
                const card = document.createElement('div');
                card.className = 'job-card';
                card.innerHTML = `
                    <div class="job-info">
                        <div class="job-top">
                            <span class="company">${item.company}</span>
                            <span class="job-title-text">${item.title}</span>
                        </div>
                        <div class="job-bottom">
                            <span class="chip chip-date">${dateStr}</span>
                            <span class="chip chip-days ${diff > 7 ? 'stale' : ''}">${diff}d ago</span>
                            <span class="chip chip-resume">📄 ${item.resume || 'General'}</span>
                            <span class="chip chip-type">💼 ${item.jobType || 'Full-time'}</span>
                            <span class="chip ${item.location === 'Remote' ? 'chip-remote' : 'chip-local'}">${item.location}</span>
                            <span class="chip chip-${item.status.toLowerCase()}">${item.status}</span>
                        </div>
                    </div>
                    <div class="job-actions">
                        ${item.url ? `<a href="${item.url}" target="_blank" class="btn-link">↗</a>` : ''}
                        <button class="btn-edit" onclick="Dashboard.openModal('${item.company.replace(/'/g, "\\'")}')">Edit</button>
                    </div>
                `;
                list.appendChild(card);
            });
            document.getElementById('visibleCount').textContent = count;
        },
        updateStats() {
            document.getElementById('stat-total').textContent = this.data.length;
            document.getElementById('stat-active').textContent = this.data.filter(i => i.status === 'Interviewing').length;
            document.getElementById('stat-remote').textContent = this.data.filter(i => i.location === 'Remote').length;
            document.getElementById('stat-contract').textContent = this.data.filter(i => i.jobType === 'Contract').length;
        },
        openModal(company = null) {
            document.getElementById('jobForm').reset();
            this.hideDeleteConfirm();
            document.getElementById('formDate').value = new Date().toLocaleDateString('en-CA');
            const deleteBtn = document.getElementById('deleteBtn');
            const oldCompanyField = document.getElementById('oldCompany');
            
            deleteBtn.style.display = company ? 'block' : 'none';
            
            if (company) {
                const item = this.data.find(i => i.company === company);
                oldCompanyField.value = item.company;
                document.getElementById('formCompany').value = item.company;
                document.getElementById('formTitle').value = item.title;
                document.getElementById('formResume').value = item.resume || 'Marketing Specialist';
                document.getElementById('formLocation').value = item.location;
                document.getElementById('formType').value = item.jobType || 'Full-time';
                document.getElementById('formStatus').value = item.status;
                document.getElementById('formUrl').value = item.url || '';
            }
            document.getElementById('modalOverlay').style.display = 'flex';
        },
        closeModal() { document.getElementById('modalOverlay').style.display = 'none'; },
        showDeleteConfirm() {
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('btnSave').style.display = 'none';
            document.getElementById('confirmArea').style.display = 'flex';
        },
        hideDeleteConfirm() {
            document.getElementById('deleteBtn').style.display = 'block';
            document.getElementById('btnSave').style.display = 'block';
            document.getElementById('confirmArea').style.display = 'none';
        },
        async executeDelete() {
            const target = document.getElementById('oldCompany').value;
            await this.sync({ action: 'delete', company: target });
        },
        async sync(payload) {
            document.getElementById('sync-status').style.display = 'inline';
            this.closeModal();
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            setTimeout(() => location.reload(), 800);
        }
    };

    document.getElementById('jobForm').onsubmit = e => {
        e.preventDefault();
        Dashboard.sync({
            action: 'upsert',
            oldCompany: document.getElementById('oldCompany').value,
            appliedDate: document.getElementById('formDate').value,
            company: document.getElementById('formCompany').value,
            title: document.getElementById('formTitle').value,
            resume: document.getElementById('formResume').value,
            location: document.getElementById('formLocation').value,
            jobType: document.getElementById('formType').value,
            status: document.getElementById('formStatus').value,
            url: document.getElementById('formUrl').value
        });
    };

    window.onload = () => Dashboard.init();
</script>
</body>
</html>
